<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matemática</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body style="background: #CFE2F3;">

    <h1>🔢 Missão de Matemática</h1>

    <div id="menu-treino">
        <div class="card-pergunta">
            <p>Vamos treinar 10 questões de Matemática?</p>
            <button class="missao" onclick="iniciarTreinoLocal('matematica')">Começar Treino</button>
        </div>

    </div>

    <div id="zona-pergunta" style="display:none;"></div>

    <br>
    <a href="../segundo-ano.html" id="link-voltar" style="text-decoration: none; color: #2c3e50; font-weight: bold;">
        ⬅ Voltar ao Menu
    </a>

    <script src="../js/exercicios.js"></script>
    <script src="../js/progresso.js"></script>

    <script>
        // Função exclusiva desta página para controlar a navegação
        function iniciarTreinoLocal(materia) {
            document.getElementById('menu-treino').style.display = 'none';
            document.getElementById('zona-pergunta').style.display = 'block';
            
            const btnVoltar = document.getElementById('link-voltar');
            if (btnVoltar) {
                btnVoltar.href = "#"; 
                btnVoltar.onclick = function(e) { 
                    e.preventDefault();
                    location.reload(); 
                };
                btnVoltar.innerHTML = "⬅ Voltar para Matemática";
            }
            treinar(materia);
        }
    </script>
</body>
</html>
