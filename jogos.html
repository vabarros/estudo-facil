<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade - Estudo Fácil</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #f1c40f; } /* Fundo amarelo para o Arcade */
        .arcade-container { text-align: center; padding: 20px; max-width: 900px; margin: 0 auto; }
        .grid-jogos { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; margin-top: 30px; }
        
        .card-jogo { 
            background: #2c3e50; border-radius: 25px; padding: 20px; width: 300px; 
            box-shadow: 0 10px 0 #1a252f; transition: transform 0.2s; color: white;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .card-jogo h3 { margin: 10px 0; font-family: 'Arial Black', sans-serif; color: #f1c40f; }

        .btn-play { 
            background: #2ecc71; color: white; border: none; padding: 15px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%;
            box-shadow: 0 5px 0 #27ae60; font-size: 1.1rem; transition: 0.1s;
        }
        .btn-play:active { transform: translateY(3px); box-shadow: 0 2px 0 #27ae60; }

        #game-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; z-index: 2000; 
        }
        iframe { width: 100%; height: calc(100% - 60px); border: none; background: #fff; }
        .btn-sair { background: #ff4757; color: white; padding: 15px; border: none; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="arcade-container">
        <button onclick="location.href='index.html'" class="card" style="width: auto; padding: 10px 20px; margin-bottom: 20px;">⬅ Voltar a Estudar</button>
        
        <h1 style="font-family: 'Arial Black', sans-serif; font-size: 2.5rem; text-shadow: 3px 3px 0 #fff;">🎮 ARCADE</h1>
        
        <div style="background: white; display: inline-block; padding: 10px 30px; border-radius: 30px; box-shadow: 0 4px 0 #ddd;">
            <span style="font-size: 1.5rem;">🪙 Créditos: <b id="contador-creditos">0</b></span>
        </div>

        <div class="grid-jogos">
            <div class="card-jogo">
                <div class="img-preview img-subway"></div>
                <h3>SUBWAY SURFERS</h3>
                <div class="badge-custo">🪙 1 CRÉDITO</div>
                <button class="btn-play" onclick="abrirJogo('subway')">JOGAR</button>
            </div>

            <div class="card-jogo">
                <div class="img-preview img-angry"></div>
                <h3>FLY BIRDS</h3>
                <div class="badge-custo">🪙 1 CRÉDITO</div>
                <button class="btn-play" onclick="abrirJogo('angry')">JOGAR</button>
            </div>

            <div class="card-jogo">
                <div class="img-preview img-dynno"></div>
                <h3>DYNNO</h3>
                <div class="badge-custo">🪙 1 CRÉDITO</div>
                <button class="btn-play" onclick="abrirJogo('dynno')">JOGAR</button>
            </div>

            <div class="card-jogo">
                <div class="img-preview img-pacman"></div>
                <h3>PACMAN</h3>
                <div class="badge-custo">🪙 1 CRÉDITO</div>
                <button class="btn-play" onclick="abrirJogo('pacman')">JOGAR</button>
            </div>

            <div class="card-jogo">
                <div class="img-preview img-birdsiege"></div>
                <h3>BIRDSIEGE</h3>
                <div class="badge-custo">🪙 1 CRÉDITO</div>
                <button class="btn-play" onclick="abrirJogo('birdsiege')">JOGAR</button>
            </div>
        </div>
    </div>

    <div id="game-overlay">
        <button class="btn-sair" onclick="fecharJogo()">✖ SAIR DO JOGO</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script src="js/progresso.js"></script>
    <script>
        // Atualiza o contador assim que a página abre
        function atualizarMoedasLocal() {
            document.getElementById('contador-creditos').innerText = progresso.carteira.creditos;
        }

        let timerJogo;

        function abrirJogo(tipo) {
            if (gastarCreditoParaJogar()) {
                const overlay = document.getElementById('game-overlay');
                const frame = document.getElementById('game-frame');
                
                const links = {
                    // Aponta para o ficheiro index.html que está dentro da pasta do jogo no TEU projeto
                    'subway': 'arcade/subway/index.html', 
                    'angry': 'arcade/flybird/index.html',
                    'dynno': 'arcade/dynno/index.html',
                    'pacman': 'arcade/pacman/index.html',
                    'birdsiege': 'arcade/BirdSiege/index.html'
};

                frame.src = links[tipo];
                overlay.style.display = 'block';
                atualizarMoedasLocal();

                // --- NOVO: Inicia contagem regressiva (ex: 10 minutos) ---
                clearTimeout(timerJogo);
                timerJogo = setTimeout(() => {
                    alert("⏰ O teu tempo acabou! Estuda mais um pouco para ganhar outro crédito.");
                    fecharJogo();
                }, 10 * 60 * 1000); // 10 minutos em milissegundos
            } else {
                alert("🛑 SEM CRÉDITOS!");
            }
        }

        function fecharJogo() {
            const overlay = document.getElementById('game-overlay');
            const frame = document.getElementById('game-frame');
            
            // Para o jogo completamente limpando a URL
            frame.src = ""; 
            overlay.style.display = 'none';
            
            // Limpa o cronómetro se ele sair antes do tempo
            clearTimeout(timerJogo);
            
            // Força a atualização da tela para mostrar que o crédito foi gasto
            location.reload(); 
}

        window.onload = atualizarMoedasLocal;
    </script>
</body>
</html>
